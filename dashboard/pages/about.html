<div class="page-header">
    <h1>About Section</h1>
    <p>Edit your portfolio About section.</p>
</div>

<form id="aboutForm">

    <div class="form-grid">

        <div class="form-group">
            <label>Heading</label>
            <input type="text" id="aboutHeading" placeholder="Who am I?">
        </div>

        <div class="form-group">
            <label>Location</label>
            <input type="text" id="aboutLocation" placeholder="Jharkhand, India">
        </div>

        <div class="form-group" style="grid-column:1/3;">
            <label>Description</label>
            <textarea id="aboutDescription" rows="6"
                placeholder="Write about yourself..."></textarea>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="aboutEmail">
        </div>

        <div class="form-group">
            <label>Phone</label>
            <input type="text" id="aboutPhone">
        </div>

        <div class="form-group">
            <label>Experience</label>
            <input type="text" id="aboutExperience" placeholder="Fresher">
        </div>

        <div class="form-group">
            <label>Education</label>
            <input type="text" id="aboutEducation">
        </div>

    </div>

    <button class="save-btn">

        Save About

    </button>

</form>
