<form id="certificatesForm">

    <input id="certificateTitle" placeholder="Certificate Title">

    <input id="certificateIssuer" placeholder="Issuer">

    <input type="date" id="certificateDate">

    <input id="certificateCredential" placeholder="Credential URL">

    <input id="certificateSkills" placeholder="Python, Automation, OOP">

    <textarea id="certificateDescription"></textarea>

    <select id="certificateFeatured">
        <option value="false">No</option>
        <option value="true">Yes</option>
    </select>

    <button type="submit" class="save-btn">
        Save Certificate
    </button>

</form>

<div id="certificatesList"></div>
