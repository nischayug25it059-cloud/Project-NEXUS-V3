<div class="page-header">
    <h1>Hero Section</h1>
    <p>Edit your portfolio landing page.</p>
</div>

<form id="heroForm">

    <div class="form-grid">

        <div class="form-group">
            <label>Name</label>
            <input type="text" id="heroName" placeholder="Your Name">
        </div>

        <div class="form-group">
            <label>Role</label>
            <input type="text" id="heroRole" placeholder="Data Analyst">
        </div>

        <div class="form-group">
            <label>Typing Text</label>
            <input type="text" id="heroTyping" placeholder="Python • SQL • Power BI">
        </div>

        <div class="form-group">
            <label>GitHub</label>
            <input type="url" id="heroGithub">
        </div>

        <div class="form-group">
            <label>LinkedIn</label>
            <input type="url" id="heroLinkedin">
        </div>

        <div class="form-group">
            <label>Resume Link</label>
            <input type="url" id="heroResume">
        </div>

    </div>

    <button class="save-btn">

        Save Hero

    </button>

</form>
